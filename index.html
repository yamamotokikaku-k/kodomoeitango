<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>こども英単語タイピング</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg1:#fffaf2;
      --bg2:#f7fff7;
      --bg3:#f7fbff;
      --ink:#25345f;
      --sub:#7a87ad;
      --line:#d7e3fb;
      --panel:rgba(255,255,255,0.88);
      --panel-strong:rgba(255,255,255,0.96);
      --shadow:0 8px 24px rgba(123, 149, 201, 0.10);

      --left-pinky:#ff8fb1;
      --left-ring:#ffb86b;
      --left-middle:#ffe073;
      --left-index:#9fe870;
      --right-index:#6fdde6;
      --right-middle:#8fb8ff;
      --right-ring:#b999ff;
      --right-pinky:#ff9df0;
      --thumb:#cfd7e8;

      --key-bg:#f5f8ff;
      --key-border:#c8d8fb;
      --key-text:#415786;
      --active-key-text:#25345f;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fff3c9 0%, transparent 28%),
        radial-gradient(circle at top right, #ffd7ec 0%, transparent 24%),
        radial-gradient(circle at bottom left, #dfffe5 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
    }

    body {
      padding: 8px;
    }

    .app {
      width: min(1380px, 100%);
      height: calc(100vh - 16px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(0, 1.05fr) minmax(0, 0.78fr) minmax(0, 0.9fr);
      gap: 8px;
      overflow: hidden;
    }

    .topbar,
    .panel {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      min-height: 66px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 18px;
      background: linear-gradient(135deg, #fef3bf, #dff5ff 55%, #e8ddff);
      border: 2px solid var(--line);
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(18px, 1.8vw, 28px);
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand p {
      margin: 2px 0 0;
      font-size: clamp(10px, 0.85vw, 12px);
      color: var(--sub);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    .controlBox {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f7faff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 5px 8px;
      min-height: 38px;
    }

    .controlBox label {
      font-size: 12px;
      color: var(--sub);
      white-space: nowrap;
    }

    select, button {
      border: none;
      outline: none;
      font: inherit;
      border-radius: 10px;
    }

    select {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 6px 8px;
      min-width: 100px;
      font-size: 13px;
      font-weight: 800;
    }

    button {
      cursor: pointer;
      color: #fff;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 3px 8px rgba(95,140,255,0.22);
    }

    button.default { background: linear-gradient(135deg, #7da4ff, #94b8ff); }
    button.alt { background: linear-gradient(135deg, #ff9fc6, #ffb86f); }
    button.green { background: linear-gradient(135deg, #63d6a0, #84e2c0); }
    button.gray { background: linear-gradient(135deg, #a3b2c9, #bcc8d9); }

    .mainCard {
      padding: 8px 10px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
    }

    .statusRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .pillWrap {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      background: #f4f8ff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      color: var(--sub);
      font-weight: 800;
    }

    .questionArea {
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 0;
      overflow: hidden;
    }

    .word {
      font-size: clamp(54px, 8.6vh, 108px);
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      word-break: break-word;
      max-width: 100%;
    }

    .translation {
      text-align: center;
      font-size: clamp(18px, 2.5vh, 30px);
      font-weight: 900;
      color: #ff7fb9;
      letter-spacing: 0.08em;
      max-width: 100%;
      word-break: break-word;
    }

    .char {
      transition: 0.12s;
      min-width: 0.6em;
      color: #95a2c6;
    }

    .char.done {
      color: #b9c4e0;
      transform: translateY(-1px);
    }

    .char.current {
      text-shadow: 0 0 10px rgba(0,0,0,0.08);
    }

    .char.rest {
      color: #22345e;
    }

    .sectionCard {
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    .sectionTitle {
      text-align: center;
      font-size: clamp(12px, 1.2vw, 18px);
      font-weight: 900;
      margin-bottom: 4px;
      color: #476089;
      letter-spacing: 0.04em;
      flex: 0 0 auto;
    }

    .keyboardWrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 0;
      overflow: hidden;
      flex: 1 1 auto;
    }

    .keyboard {
      display: grid;
      gap: 6px;
      transform-origin: center center;
      max-width: 100%;
    }

    .keyRow {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .key {
      width: clamp(42px, 3.6vw, 62px);
      height: clamp(40px, 3.8vw, 54px);
      border-radius: 14px;
      background: var(--key-bg);
      border: 2px solid var(--key-border);
      display: grid;
      place-items: center;
      font-weight: 1000;
      font-size: clamp(18px, 1.45vw, 30px);
      color: var(--key-text);
      box-shadow: 0 4px 0 rgba(173, 191, 231, 0.35);
      transition: transform 0.08s ease, background 0.12s ease, border-color 0.12s ease;
      user-select: none;
    }

    .key.active {
      transform: translateY(2px);
      color: var(--active-key-text);
      box-shadow: 0 2px 0 rgba(173, 191, 231, 0.35);
    }

    .handsWrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .handCard {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
      padding: 8px 8px 0;
    }

    .fingerWrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      height: 100%;
      max-height: 210px;
      overflow: hidden;
      transform-origin: bottom center;
    }

    .finger {
      width: clamp(40px, 3.2vw, 56px);
      border-radius: 24px 24px 16px 16px;
      border: 4px solid #eab873;
      background: linear-gradient(180deg, #ffe2bf, #ffd29f);
      box-shadow:
        inset 0 -4px 0 rgba(255,255,255,0.28),
        0 6px 0 rgba(234, 184, 115, 0.20);
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10px;
      color: #7f4d08;
      font-weight: 1000;
      font-size: clamp(14px, 1.1vw, 20px);
      transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      flex: 0 0 auto;
    }

    .finger::after {
      content: "";
      position: absolute;
      left: 7px;
      right: 7px;
      bottom: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
    }

    .f-pinky { height: 126px; }
    .f-ring { height: 148px; }
    .f-middle { height: 166px; }
    .f-index { height: 142px; }

    .thumb {
      width: 58px;
      height: 78px;
      border-radius: 22px;
      transform: rotate(-18deg);
      margin: 0 0 6px 2px;
      padding-top: 13px;
    }

    .right-thumb {
      transform: rotate(18deg);
      margin: 0 2px 6px 0;
    }

    .finger.active {
      transform: translateY(-4px);
      box-shadow:
        0 0 0 5px rgba(255,255,255,0.88),
        0 0 0 9px rgba(255,255,255,0.46),
        0 10px 20px rgba(0,0,0,0.08);
      filter: saturate(1.08) brightness(1.03);
    }

    .mainCard.shake {
      animation: shakeScreen 0.16s linear 1;
    }

    @keyframes shakeScreen {
      0% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 1180px) {
      .topbar {
        padding: 8px 10px;
      }
      .controlBox label {
        display: none;
      }
      .controls {
        gap: 6px;
      }
      select {
        min-width: 90px;
      }
    }

    @media (max-width: 920px) {
      .app {
        grid-template-rows: auto minmax(0, 1fr) minmax(0, 0.72fr) minmax(0, 0.9fr);
      }
      .handsWrap {
        gap: 8px;
      }
      .fingerWrap {
        transform: scale(0.9);
      }
      .brand p {
        display: none;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 6px;
      }
      .app {
        height: calc(100vh - 12px);
        gap: 6px;
      }
      .topbar, .panel {
        border-radius: 18px;
      }
      .topbar {
        flex-direction: column;
        align-items: stretch;
        min-height: 0;
      }
      .brand {
        width: 100%;
      }
      .controls {
        width: 100%;
        justify-content: space-between;
      }
      .controlBox {
        flex: 1 1 auto;
        min-width: 0;
      }
      select, button {
        width: 100%;
      }
      .handsWrap {
        grid-template-columns: 1fr 1fr;
      }
      .fingerWrap {
        transform: scale(0.78);
      }
      .sectionTitle {
        font-size: 12px;
      }
    }

    @media (max-width: 560px) {
      .controls {
        flex-wrap: wrap;
      }
      .controlBox {
        flex: 1 1 48%;
      }
      .handsWrap {
        gap: 6px;
      }
      .fingerWrap {
        transform: scale(0.68);
      }
      .word {
        letter-spacing: 0.04em;
      }
    }
  </style>
</head>
<body>
  <div class="app">

            <option value="next">つぎのグループへ</option>

        </div>

        <button id="readBtn" class="alt">📣 よみなおし</button>
        <button id="shuffleBtn" class="green">🔀 シャッフル</button>

    <section id="mainCard" class="panel mainCard">

            <div class="finger f-pinky" data-finger="RP">こ</div>
          </div>
        </div>
      </div>
    </section>
  </div>

      LP: getCSS("--left-pinky"),
      LR: getCSS("--left-ring"),
      LM: getCSS("--left-middle"),
      LI: getCSS("--left-index"),
      RI: getCSS("--right-index"),
      RM: getCSS("--right-middle"),
      RR: getCSS("--right-ring"),
      RP: getCSS("--right-pinky"),
      LT: getCSS("--thumb"),
      RT: getCSS("--thumb")
    };

    const groupSelect = document.getElementById("groupSelect");
    const modeSelect = document.getElementById("modeSelect");
    const readBtn = document.getElementById("readBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const resetBtn = document.getElementById("resetBtn");

    const groupInfo = document.getElementById("groupInfo");
    const questionInfo = document.getElementById("questionInfo");
    const wordText = document.getElementById("wordText");
    const meaningText = document.getElementById("meaningText");
    const mainCard = document.getElementById("mainCard");

    const keyEls = [...document.querySelectorAll(".key")];
    const fingerEls = [...document.querySelectorAll(".finger")];

    let groupIndex = 0;
    let questionIndex = 0;
    let typedIndex = 0;
    let groups = WORD_GROUPS.map(group => [...group]);
    let utterance = null;
    let audioCtx = null;

    function initGroupSelect() {
      groupSelect.innerHTML = "";
      groups.forEach((_, i) => {
        const option = document.createElement("option");
        option.value = i;
        option.textContent = `グループ ${i + 1}`;
        groupSelect.appendChild(option);
      });
    }

    function currentWord() {
      return groups[groupIndex][questionIndex];
    }

    function normalizeInputKey(key) {
      if (!key || key.length !== 1) return "";
      const upper = key.toUpperCase();
      if (upper >= "A" && upper <= "Z") return upper;
      return "";
    }

    function getCurrentLetter() {
      const word = currentWord().en.toUpperCase();
      return word[typedIndex] || "";
    }

    function getCurrentFinger() {
      const letter = getCurrentLetter();
      return FINGER_MAP[letter] || null;
    }

    function renderWord() {
      const word = currentWord().en.toUpperCase();
      const done = word.slice(0, typedIndex);
      const current = word[typedIndex] || "";
      const rest = word.slice(typedIndex + 1);
      const finger = getCurrentFinger();
      const activeColor = finger ? FINGER_COLOR[finger] : "#22345e";

      wordText.innerHTML = `
        <span class="char done">${escapeHTML(done)}</span><span class="char current" style="color:${activeColor};">${escapeHTML(current)}</span><span class="char rest">${escapeHTML(rest)}</span>
      `;
    }

    function renderWordInfo() {
      const item = currentWord();
      meaningText.textContent = item.ja;
      renderWord();
      updateHighlights();
      updateInfo();
    }

    function updateInfo() {
      groupInfo.textContent = `グループ ${groupIndex + 1} / ${groups.length}`;
      questionInfo.textContent = `もんだい ${questionIndex + 1} / ${groups[groupIndex].length}`;
    }

    function clearHighlights() {
      keyEls.forEach(el => {
        el.classList.remove("active");
        el.style.background = "";
        el.style.borderColor = "";
      });
      fingerEls.forEach(el => {
        el.classList.remove("active");
        el.style.background = "";
        el.style.borderColor = "";
      });
    }

    function updateHighlights() {
      clearHighlights();

      const letter = getCurrentLetter();
      const finger = getCurrentFinger();
      const color = finger ? FINGER_COLOR[finger] : "";

      if (letter) {
        const keyEl = keyEls.find(el => el.dataset.key === letter);
        if (keyEl) {
          keyEl.classList.add("active");
          keyEl.style.background = color || "";
          keyEl.style.borderColor = color || "";
        }
      }

      if (finger) {
        const fingerEl = fingerEls.find(el => el.dataset.finger === finger);
        if (fingerEl) {
          fingerEl.classList.add("active");
          fingerEl.style.background = color ? `linear-gradient(180deg, ${lighten(color, 16)}, ${color})` : "";
          fingerEl.style.borderColor = darken(color, 16);
        }
      }
    }

    function nextQuestion() {
      typedIndex = 0;
      questionIndex += 1;

      if (questionIndex >= groups[groupIndex].length) {
        if (modeSelect.value === "next") {
          groupIndex = (groupIndex + 1) % groups.length;
        }
        questionIndex = 0;
      }

      groupSelect.value = String(groupIndex);
      renderWordInfo();
    }

    function shuffleCurrentGroup() {
      const current = groups[groupIndex];
      for (let i = current.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [current[i], current[j]] = [current[j], current[i]];
      }
      questionIndex = 0;
      typedIndex = 0;
      renderWordInfo();
    }

    function resetAll() {
      groups = WORD_GROUPS.map(group => [...group]);
      groupIndex = 0;
      questionIndex = 0;
      typedIndex = 0;
      groupSelect.value = "0";
      renderWordInfo();
    }

    function handleCorrectInput() {
      playTypeSound();
      typedIndex += 1;
      renderWord();
      updateHighlights();

      if (typedIndex >= currentWord().en.length) {
        setTimeout(() => nextQuestion(), 170);
      }
    }

    function handleWrongInput() {
      playMissSound();
      mainCard.classList.remove("shake");
      void mainCard.offsetWidth;
      mainCard.classList.add("shake");
    }

    function speakCurrentWord() {
      if (!("speechSynthesis" in window)) return;
      const item = currentWord();

      window.speechSynthesis.cancel();
      utterance = new SpeechSynthesisUtterance(item.en);
      utterance.lang = "en-US";
      utterance.rate = 0.82;
      utterance.pitch = 1.05;
      window.speechSynthesis.speak(utterance);
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playTone(freq, duration, type, gainValue) {
      ensureAudio();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playTypeSound() {
      playTone(880, 0.05, "square", 0.03);
      setTimeout(() => playTone(1320, 0.04, "square", 0.02), 14);
    }

    function playMissSound() {
      playTone(200, 0.08, "sawtooth", 0.03);
      setTimeout(() => playTone(150, 0.09, "triangle", 0.025), 18);
    }

    function escapeHTML(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "").trim();
      const full = clean.length === 3
        ? clean.split("").map(c => c + c).join("")
        : clean;
      const num = parseInt(full, 16);
      return {
        r: (num >> 16) & 255,
        g: (num >> 8) & 255,
        b: num & 255
      };
    }

    function clamp(num, min, max) {
      return Math.min(max, Math.max(min, num));
    }

    function lighten(hex, amount) {
      const { r, g, b } = hexToRgb(hex);
      return `rgb(${clamp(r + amount, 0, 255)}, ${clamp(g + amount, 0, 255)}, ${clamp(b + amount, 0, 255)})`;
    }

    function darken(hex, amount) {
      const { r, g, b } = hexToRgb(hex);
      return `rgb(${clamp(r - amount, 0, 255)}, ${clamp(g - amount, 0, 255)}, ${clamp(b - amount, 0, 255)})`;
    }

    groupSelect.addEventListener("change", () => {
      groupIndex = Number(groupSelect.value);
      questionIndex = 0;
      typedIndex = 0;
      renderWordInfo();
    });

    readBtn.addEventListener("click", speakCurrentWord);
    shuffleBtn.addEventListener("click", shuffleCurrentGroup);
    resetBtn.addEventListener("click", resetAll);

    window.addEventListener("keydown", (e) => {
      if (e.repeat) return;

      if (e.code === "Space") {
        e.preventDefault();
        speakCurrentWord();
        return;
      }

      if (e.key === "Enter") {
        e.preventDefault();
        nextQuestion();
        return;
      }

      const input = normalizeInputKey(e.key);
      if (!input) return;

      const expected = getCurrentLetter();
      if (!expected) return;

      if (input === expected) {
        handleCorrectInput();
      } else {
        handleWrongInput();
      }
    });

    initGroupSelect();
    groupSelect.value = "0";
    renderWordInfo();

    setTimeout(() => {
      if ("speechSynthesis" in window) {
        speakCurrentWord();
      }
    }, 250);
  </script>
</body>
</html>
