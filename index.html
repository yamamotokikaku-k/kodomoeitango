<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>こども英単語タイピング</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    :root{
      --bg1:#f9fbff;
      --bg2:#fff8ef;
      --bg3:#f7fff4;
      --panel:#ffffffee;
      --line:#d7e3f5;
      --text:#20304a;
      --sub:#5f7191;
      --typed:#5f8cff;
      --done:#7f8da8;
      --miss:#ff6f7d;
      --key:#eef4ff;
      --shadow:0 6px 18px rgba(84,115,180,0.10);

      --finger-lp:#ff9aa2;
      --finger-lr:#ffb86b;
      --finger-lm:#ffe27a;
      --finger-li:#8ee3a3;
      --finger-ri:#7ed6ff;
      --finger-rm:#9eb7ff;
      --finger-rr:#c7a6ff;
      --finger-rp:#ff9fe0;
    }

    body{
      background:
        radial-gradient(circle at 15% 15%, #ffe7f2 0%, transparent 25%),
        radial-gradient(circle at 85% 20%, #fff3b8 0%, transparent 25%),
        radial-gradient(circle at 20% 85%, #dfffe7 0%, transparent 28%),
        radial-gradient(circle at 80% 80%, #dfe9ff 0%, transparent 26%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 52%, var(--bg3));
      color: var(--text);
    }

    .app{
      width: 100%;
      height: 100%;
      max-width: 1380px;
      margin: 0 auto;
      padding: 8px 10px;
      display: grid;
      grid-template-rows:
        auto
        minmax(0, 1.2fr)
        minmax(0, 0.72fr)
        minmax(0, 0.68fr)
        auto;
      gap: 8px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px 12px;
      box-shadow:var(--shadow);
      min-height: 62px;
    }

    .titleWrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .titleBadge{
      width:42px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(135deg,#ffd1e7,#c9dcff,#d7ffd8);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      flex:0 0 auto;
    }

    .titleText h1{
      margin:0;
      font-size:clamp(18px, 1.8vw, 28px);
      line-height:1.05;
    }

    .titleText p{
      margin:2px 0 0;
      font-size:clamp(10px, 0.85vw, 13px);
      color:var(--sub);
    }

    .controls{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .controlBox{
      display:flex;
      align-items:center;
      gap:6px;
      background:#f7faff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:5px 8px;
      min-height:38px;
    }

    .controlBox label{
      font-size:12px;
      color:var(--sub);
      white-space:nowrap;
    }

    select, button{
      border:none;
      outline:none;
      font:inherit;
      border-radius:10px;
    }

    select{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      padding:6px 8px;
      min-width:100px;
      font-size:13px;
    }

    button{
      cursor:pointer;
      color:#fff;
      padding:7px 10px;
      font-size:13px;
      font-weight:800;
      box-shadow: 0 3px 8px rgba(95,140,255,0.22);
    }

    button.default{ background:linear-gradient(135deg, #7da4ff, #94b8ff); }
    button.alt{ background:linear-gradient(135deg, #ff9fc6, #ffb86f); }
    button.green{ background:linear-gradient(135deg, #63d6a0, #84e2c0); }
    button.gray{ background:linear-gradient(135deg, #a3b2c9, #bcc8d9); }

    .mainCard{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:10px 12px;
      display:grid;
      grid-template-rows:auto minmax(0, 1fr) auto;
      min-height:0;
      overflow:hidden;
    }

    .mainCard.shake{
      animation: shakeScreen 0.16s linear 1;
    }

    @keyframes shakeScreen {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-5px); }
      80%  { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }

    .statusRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .pillRow{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .pill{
      background:#f4f8ff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      color:var(--sub);
      font-weight:800;
    }

    .questionArea{
      min-height:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:4px 0;
      overflow:hidden;
    }

    .word{
      font-size:clamp(28px, 4.2vh, 58px);
      line-height:1.02;
      font-weight:900;
      letter-spacing:0.08em;
      text-transform:lowercase;
      text-align:center;
      word-break:break-word;
      max-width:100%;
    }

    .translation{
      text-align:center;
      font-size:clamp(18px, 2.5vh, 30px);
      font-weight:900;
      color:#ff7b9e;
      letter-spacing:0.08em;
      max-width:100%;
      word-break:break-word;
    }

    .typingArea{
      background:linear-gradient(180deg,#f9fbff,#f4f8ff);
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px 10px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
      min-height:0;
      overflow:hidden;
    }

    .prompt{
      text-align:center;
      color:var(--sub);
      font-size:13px;
      font-weight:800;
    }

    .typedLine{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:0;
      flex-wrap:wrap;
      min-height:46px;
      text-align:center;
      overflow:hidden;
    }

    .char{
      font-size:clamp(22px, 3.1vh, 40px);
      font-weight:900;
      letter-spacing:0.02em;
      color:var(--done);
      transition:0.12s;
      min-width:0.6em;
    }

    .char.done{
      color:var(--typed);
      transform: translateY(-1px);
    }

    .char.current{
      color:#ff8a00;
      text-shadow:0 0 10px rgba(255,138,0,0.18);
    }

    .inputInfo{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .nextKeyBox{
      background:#fff;
      border:2px solid #d8e4ff;
      border-radius:16px;
      padding:6px 12px;
      display:flex;
      align-items:center;
      gap:8px;
      min-height:44px;
    }

    .nextKeyLabel{
      color:var(--sub);
      font-size:13px;
      font-weight:800;
    }

    .nextKey{
      min-width:42px;
      height:34px;
      border-radius:10px;
      border:2px solid #b8cfff;
      background:#eef4ff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:900;
      color:#3459b5;
      box-shadow: inset 0 -3px 0 rgba(52,89,181,0.12);
    }

    .message{
      min-height:20px;
      text-align:center;
      font-weight:900;
      font-size:14px;
      color: var(--sub);
    }

    .progressBar{
      height:8px;
      border-radius:999px;
      background:#eaf1ff;
      overflow:hidden;
      border:1px solid #d3e2ff;
      margin-top:2px;
    }

    .progressInner{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#7da4ff,#ff9fc6,#7ad9a7);
      transition:0.18s;
    }

    .sectionCard{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:8px 10px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:0;
      overflow:hidden;
    }

    .sectionTitle{
      text-align:center;
      font-size:clamp(14px, 1.2vw, 18px);
      font-weight:900;
      margin-bottom:5px;
      color:#476089;
      letter-spacing:0.04em;
      flex:0 0 auto;
    }

    .keyboardWrap{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:0;
      overflow:hidden;
      flex:1 1 auto;
    }

    .keyboard{
      display:grid;
      grid-template-columns: repeat(10, minmax(24px, 1fr));
      gap: 4px;
      width:min(620px, 72%);
    }

    .key{
      background:var(--key);
      border:2px solid #cfe0ff;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(12px, 1vw, 17px);
      font-weight:900;
      color:#3a568a;
      aspect-ratio: 1.22 / 1;
      box-shadow: inset 0 -3px 0 rgba(58,86,138,0.10);
      transition:0.12s;
    }

    .key.active.LP{
      background:var(--finger-lp);
      border-color:#e16d78;
      color:#6e2130;
      transform:translateY(-2px);
      box-shadow:0 0 0 4px rgba(255,154,162,0.28), inset 0 -3px 0 rgba(110,33,48,0.10);
    }
    .key.active.LR{
      background:var(--finger-lr);
      border-color:#db9440;
      color:#704100;
      transform:translateY(-2px);
      box-shadow:0 0 0 4px rgba(255,184,107,0.28), inset 0 -3px 0 rgba(112,65,0,0.10);
    }
    .key.active.LM{
      background:var(--finger-lm);
      border-color:#d1b54f;
      color:#6e5700;
      transform:translateY(-2px);
      box-shadow:0 0 0 4px rgba(255,226,122,0.28), inset 0 -3px 0 rgba(110,87,0,0.10);
    }
    .key.active.LI{
      background:var(--finger-li);
      border-color:#51bc71;
      color:#165f2d;
      transform:translateY(-2px);
      box-shadow:0 0 0 4px rgba(142,227,163,0.28), inset 0 -3px 0 rgba(22,95,45,0.10);
    }
    .key.active.RI{
      background:var(--finger-ri);
      border-color:#53b6de;
      color:#0f5470;
      transform:translateY(-2px);
      box-shadow:0 0 0 4px rgba(126,214,255,0.28), inset 0 -3px 0 rgba(15,84,112,0.10);
    }
    .key.active.RM{
      background:var(--finger-rm);
      border-color:#728ddd;
      color:#243a7a;
      transform:translateY(-2px);
      box-shadow:0 0 0 4px rgba(158,183,255,0.28), inset 0 -3px 0 rgba(36,58,122,0.10);
    }
    .key.active.RR{
      background:var(--finger-rr);
      border-color:#9374d7;
      color:#4f2e87;
      transform:translateY(-2px);
      box-shadow:0 0 0 4px rgba(199,166,255,0.28), inset 0 -3px 0 rgba(79,46,135,0.10);
    }
    .key.active.RP{
      background:var(--finger-rp);
      border-color:#dc6ec0;
      color:#7a235f;
      transform:translateY(-2px);
      box-shadow:0 0 0 4px rgba(255,159,224,0.28), inset 0 -3px 0 rgba(122,35,95,0.10);
    }

    .handsWrap{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:16px;
      min-height:0;
      overflow:hidden;
      flex:1 1 auto;
    }

    .handCard{
      background:linear-gradient(180deg,#fffaf1,#fff);
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px 10px;
      width:min(430px, 42%);
      min-width:240px;
      min-height:0;
      overflow:hidden;
    }

    .handTitle{
      text-align:center;
      font-size:13px;
      font-weight:800;
      color:var(--sub);
      margin-bottom:4px;
    }

    .fingers{
      display:flex;
      justify-content:center;
      align-items:flex-end;
      gap:8px;
      height:100%;
      min-height:0;
    }

    .finger{
      width:min(4vw, 38px);
      min-width:24px;
      border-radius:16px 16px 10px 10px;
      background:linear-gradient(180deg,#ffe6c8,#ffd8ae);
      border:2px solid #f0bf84;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      font-size:12px;
      font-weight:900;
      color:#8d5a1d;
      padding-top:4px;
      transition:0.12s;
      box-shadow: inset 0 -3px 0 rgba(141,90,29,0.10);
      position: relative;
    }

    .finger.active{
      transform: translateY(-4px);
    }

    .finger#finger-LP.active{
      background:linear-gradient(180deg,var(--finger-lp),#ffbdc3);
      border-color:#e16d78;
      box-shadow:0 0 0 4px rgba(255,154,162,0.28), inset 0 -3px 0 rgba(110,33,48,0.10);
      color:#6e2130;
    }
    .finger#finger-LR.active{
      background:linear-gradient(180deg,var(--finger-lr),#ffd19a);
      border-color:#db9440;
      box-shadow:0 0 0 4px rgba(255,184,107,0.28), inset 0 -3px 0 rgba(112,65,0,0.10);
      color:#704100;
    }
    .finger#finger-LM.active{
      background:linear-gradient(180deg,var(--finger-lm),#fff0a9);
      border-color:#d1b54f;
      box-shadow:0 0 0 4px rgba(255,226,122,0.28), inset 0 -3px 0 rgba(110,87,0,0.10);
      color:#6e5700;
    }
    .finger#finger-LI.active{
      background:linear-gradient(180deg,var(--finger-li),#bdf2ca);
      border-color:#51bc71;
      box-shadow:0 0 0 4px rgba(142,227,163,0.28), inset 0 -3px 0 rgba(22,95,45,0.10);
      color:#165f2d;
    }
    .finger#finger-RI.active{
      background:linear-gradient(180deg,var(--finger-ri),#bfeeff);
      border-color:#53b6de;
      box-shadow:0 0 0 4px rgba(126,214,255,0.28), inset 0 -3px 0 rgba(15,84,112,0.10);
      color:#0f5470;
    }
    .finger#finger-RM.active{
      background:linear-gradient(180deg,var(--finger-rm),#cad8ff);
      border-color:#728ddd;
      box-shadow:0 0 0 4px rgba(158,183,255,0.28), inset 0 -3px 0 rgba(36,58,122,0.10);
      color:#243a7a;
    }
    .finger#finger-RR.active{
      background:linear-gradient(180deg,var(--finger-rr),#dec9ff);
      border-color:#9374d7;
      box-shadow:0 0 0 4px rgba(199,166,255,0.28), inset 0 -3px 0 rgba(79,46,135,0.10);
      color:#4f2e87;
    }
    .finger#finger-RP.active{
      background:linear-gradient(180deg,var(--finger-rp),#ffc8ef);
      border-color:#dc6ec0;
      box-shadow:0 0 0 4px rgba(255,159,224,0.28), inset 0 -3px 0 rgba(122,35,95,0.10);
      color:#7a235f;
    }

    .finger.index  { height: min(70px, 8.2vh); }
    .finger.middle { height: min(76px, 8.9vh); }
    .finger.ring   { height: min(72px, 8.4vh); }
    .finger.pinky  { height: min(58px, 6.8vh); }
    .finger.thumb  {
      height: min(42px, 4.8vh);
      width:min(48px, 5vw);
      border-radius:14px;
      align-self:center;
      transform: translateY(10px) rotate(-18deg);
    }
    .right .finger.thumb{
      transform: translateY(10px) rotate(18deg);
    }
    .left .finger.thumb.active{
      transform: translateY(6px) rotate(-18deg);
    }
    .right .finger.thumb.active{
      transform: translateY(6px) rotate(18deg);
    }

    .footerNote{
      text-align:center;
      color:var(--sub);
      font-size:11px;
      font-weight:800;
      min-height:14px;
      padding-bottom:2px;
    }

    @media (max-width: 980px){
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .controls{
        justify-content:center;
      }

      .keyboard{
        width:min(560px, 82%);
      }

      .handCard{
        min-width:0;
        width:48%;
      }
    }

    @media (max-width: 760px){
      .app{
        grid-template-rows:
          auto
          minmax(0, 1.16fr)
          minmax(0, 0.66fr)
          minmax(0, 0.72fr)
          auto;
      }

      .keyboard{
        width:92%;
      }

      .handsWrap{
        gap:8px;
      }

      .finger{
        min-width:20px;
        font-size:11px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="titleWrap">
        <div class="titleBadge">⌨️</div>
        <div class="titleText">
          <h1>こども英単語タイピング</h1>
          <p>どうぶつ・のりもの・かぐ・せいかつのことば 100ご</p>
        </div>
      </div>

      <div class="controls">
        <div class="controlBox">
          <label for="groupSelect">グループ</label>
          <select id="groupSelect"></select>
        </div>

        <div class="controlBox">
          <label for="modeSelect">モード</label>
          <select id="modeSelect">
            <option value="repeat">このグループをくりかえす</option>
            <option value="auto">つぎのグループへじどういどう</option>
          </select>
        </div>

        <button id="replayBtn" class="alt">🔊 よみなおし</button>
        <button id="shuffleBtn" class="green">🔀 シャッフル</button>
        <button id="restartBtn" class="gray">↺ はじめから</button>
      </div>
    </div>

    <div class="mainCard" id="mainCard">
      <div class="statusRow">
        <div class="pillRow">
          <div class="pill" id="groupInfo">グループ 1 / 10</div>
          <div class="pill" id="wordInfo">もんだい 1 / 10</div>
          <div class="pill" id="modeInfo">このグループをくりかえす</div>
        </div>
        <div class="pillRow">
          <div class="pill">スペースキー：よみなおし</div>
          <div class="pill">Enter：つぎへ</div>
        </div>
      </div>

      <div class="questionArea">
        <div class="word" id="wordDisplay">dog</div>
        <div class="translation" id="translationDisplay">いぬ</div>
      </div>

      <div class="typingArea">
        <div class="prompt">うえの えいたんご を うって ください</div>
        <div class="typedLine" id="typedLine"></div>

        <div class="inputInfo">
          <div class="nextKeyBox">
            <div class="nextKeyLabel">つぎに おすキー</div>
            <div class="nextKey" id="nextKeyBox">D</div>
          </div>
        </div>

        <div class="message" id="message">キーを おして スタート</div>

        <div class="progressBar">
          <div class="progressInner" id="progressInner"></div>
        </div>
      </div>
    </div>

    <div class="sectionCard">
      <div class="sectionTitle">⌨️ キーボード</div>
      <div class="keyboardWrap">
        <div class="keyboard" id="keyboard"></div>
      </div>
    </div>

    <div class="sectionCard">
      <div class="sectionTitle">🖐️ つかう ゆび</div>
      <div class="handsWrap">
        <div class="handCard">
          <div class="handTitle">ひだりて</div>
          <div class="fingers left">
            <div class="finger pinky"  id="finger-LP">こ</div>
            <div class="finger ring"   id="finger-LR">く</div>
            <div class="finger middle" id="finger-LM">な</div>
            <div class="finger index"  id="finger-LI">ひ</div>
            <div class="finger thumb"  id="finger-LT">お</div>
          </div>
        </div>

        <div class="handCard">
          <div class="handTitle">みぎて</div>
          <div class="fingers right">
            <div class="finger thumb"  id="finger-RT">お</div>
            <div class="finger index"  id="finger-RI">ひ</div>
            <div class="finger middle" id="finger-RM">な</div>
            <div class="finger ring"   id="finger-RR">く</div>
            <div class="finger pinky"  id="finger-RP">こ</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footerNote" id="footerNote">
      10ごずつ れんしゅうできます。ことばは じどうで よみあげます。
    </div>
  </div>

  <script>
    const groups = [
      [
        { en:"dog", ja:"いぬ" },
        { en:"cat", ja:"ねこ" },
        { en:"bird", ja:"とり" },
        { en:"fish", ja:"さかな" },
        { en:"rabbit", ja:"うさぎ" },
        { en:"horse", ja:"うま" },
        { en:"cow", ja:"うし" },
        { en:"pig", ja:"ぶた" },
        { en:"duck", ja:"あひる" },
        { en:"frog", ja:"かえる" }
      ],
      [
        { en:"lion", ja:"らいおん" },
        { en:"tiger", ja:"とら" },
        { en:"bear", ja:"くま" },
        { en:"monkey", ja:"さる" },
        { en:"elephant", ja:"ぞう" },
        { en:"giraffe", ja:"きりん" },
        { en:"zebra", ja:"しまうま" },
        { en:"panda", ja:"ぱんだ" },
        { en:"koala", ja:"こあら" },
        { en:"sheep", ja:"ひつじ" }
      ],
      [
        { en:"apple", ja:"りんご" },
        { en:"banana", ja:"ばなな" },
        { en:"orange", ja:"おれんじ" },
        { en:"grape", ja:"ぶどう" },

        { en:"melon", ja:"めろん" },
        { en:"lemon", ja:"れもん" },
        { en:"tomato", ja:"とまと" },
        { en:"carrot", ja:"にんじん" },
        { en:"corn", ja:"とうもろこし" }
      ],
      [
        { en:"bread", ja:"ぱん" },

        { en:"water", ja:"みず" },
        { en:"juice", ja:"じゅーす" },

        { en:"icecream", ja:"あいすくりーむ" }
      ],
      [
        { en:"table", ja:"てーぶる" },
        { en:"chair", ja:"いす" },
        { en:"bed", ja:"べっど" },
        { en:"sofa", ja:"そふぁ" },
        { en:"desk", ja:"つくえ" },
        { en:"door", ja:"どあ" },
        { en:"window", ja:"まど" },
        { en:"clock", ja:"とけい" },

        { en:"mirror", ja:"かがみ" }
      ],
      [
        { en:"pencil", ja:"えんぴつ" },
        { en:"book", ja:"ほん" },
        { en:"bag", ja:"かばん" },
        { en:"ball", ja:"ぼーる" },
        { en:"doll", ja:"にんぎょう" },
        { en:"robot", ja:"ろぼっと" },
        { en:"drum", ja:"たいこ" },
        { en:"train", ja:"でんしゃ" },
        { en:"plane", ja:"ひこうき" },
        { en:"boat", ja:"ふね" }
      ],
      [
        { en:"car", ja:"くるま" },
        { en:"bus", ja:"ばす" },
        { en:"bike", ja:"じてんしゃ" },
        { en:"truck", ja:"とらっく" },
        { en:"ship", ja:"ふね" },
        { en:"taxi", ja:"たくしー" },
        { en:"rocket", ja:"ろけっと" },
        { en:"scooter", ja:"すくーたー" },
        { en:"helmet", ja:"へるめっと" },
        { en:"wheel", ja:"わ" }
      ],
      [
        { en:"house", ja:"いえ" },
        { en:"school", ja:"がっこう" },
        { en:"park", ja:"こうえん" },
        { en:"store", ja:"みせ" },
        { en:"garden", ja:"にわ" },
        { en:"kitchen", ja:"きっちん" },
        { en:"bath", ja:"おふろ" },
        { en:"toilet", ja:"といれ" },
        { en:"stairs", ja:"かいだん" },
        { en:"room", ja:"へや" }
      ],
      [
        { en:"sun", ja:"たいよう" },
        { en:"moon", ja:"つき" },
        { en:"star", ja:"ほし" },
        { en:"cloud", ja:"くも" },
        { en:"rain", ja:"あめ" },
        { en:"snow", ja:"ゆき" },
        { en:"tree", ja:"き" },
        { en:"flower", ja:"はな" },
        { en:"leaf", ja:"はっぱ" },
        { en:"stone", ja:"いし" }
      ],
      [
        { en:"hand", ja:"て" },
        { en:"foot", ja:"あし" },
        { en:"eye", ja:"め" },
        { en:"nose", ja:"はな" },
        { en:"mouth", ja:"くち" },
        { en:"ear", ja:"みみ" },
        { en:"hat", ja:"ぼうし" },
        { en:"shirt", ja:"しゃつ" },
        { en:"pants", ja:"ずぼん" },
        { en:"shoes", ja:"くつ" }
      ]
    ];

    const keyboardRows = [
      ["Q","W","E","R","T","Y","U","I","O","P"],
      ["A","S","D","F","G","H","J","K","L"],
      ["Z","X","C","V","B","N","M"]
    ];

    const fingerMap = {
      "Q":"LP","A":"LP","Z":"LP",
      "W":"LR","S":"LR","X":"LR",
      "E":"LM","D":"LM","C":"LM",
      "R":"LI","F":"LI","V":"LI","T":"LI","G":"LI","B":"LI",
      "Y":"RI","H":"RI","N":"RI","U":"RI","J":"RI","M":"RI",
      "I":"RM","K":"RM",
      "O":"RR","L":"RR",
      "P":"RP"
    };

    const groupSelect = document.getElementById("groupSelect");
    const modeSelect = document.getElementById("modeSelect");
    const replayBtn = document.getElementById("replayBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const restartBtn = document.getElementById("restartBtn");

    const wordDisplay = document.getElementById("wordDisplay");
    const translationDisplay = document.getElementById("translationDisplay");
    const typedLine = document.getElementById("typedLine");
    const nextKeyBox = document.getElementById("nextKeyBox");
    const messageEl = document.getElementById("message");
    const progressInner = document.getElementById("progressInner");

    const groupInfo = document.getElementById("groupInfo");
    const wordInfo = document.getElementById("wordInfo");
    const modeInfo = document.getElementById("modeInfo");
    const footerNote = document.getElementById("footerNote");
    const keyboardEl = document.getElementById("keyboard");
    const mainCard = document.getElementById("mainCard");

    let currentGroupIndex = 0;
    let currentWordIndex = 0;
    let inputIndex = 0;
    let groupOrder = groups.map(group => group.map((_, i) => i));
    let audioCtx = null;

    function buildGroupSelect(){
      groupSelect.innerHTML = "";
      groups.forEach((g, i) => {
        const op = document.createElement("option");
        op.value = i;
        op.textContent = `グループ ${i + 1}`;
        groupSelect.appendChild(op);
      });
    }

    function buildKeyboard(){
      keyboardEl.innerHTML = "";
      keyboardRows.forEach(row => {
        row.forEach(letter => {
          const key = document.createElement("div");
          key.className = "key";
          key.id = `key-${letter}`;
          key.textContent = letter;
          keyboardEl.appendChild(key);
        });

        if(row.length === 9){
          const spacer = document.createElement("div");
          spacer.style.visibility = "hidden";
          keyboardEl.appendChild(spacer);
        }
        if(row.length === 7){
          for(let i = 0; i < 3; i++){
            const spacer = document.createElement("div");
            spacer.style.visibility = "hidden";
            keyboardEl.appendChild(spacer);
          }
        }
      });
    }

    function getCurrentWord(){
      const actualIndex = groupOrder[currentGroupIndex][currentWordIndex];
      return groups[currentGroupIndex][actualIndex];
    }

    function shuffleCurrentGroup(){
      const arr = groupOrder[currentGroupIndex];
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function getNextChar(){
      const word = getCurrentWord().en;
      return word[inputIndex] || "";
    }

    function speakCurrentWord(){
      const word = getCurrentWord().en;
      if(!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(word);
      utter.lang = "en-US";
      utter.rate = 0.85;
      utter.pitch = 1.15;
      utter.volume = 1;
      window.speechSynthesis.speak(utter);
    }

    function initAudio(){
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === "suspended"){
        audioCtx.resume();
      }
    }

    function playTone(type){
      initAudio();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      if(type === "type"){
        osc.type = "triangle";
        osc.frequency.setValueAtTime(720, now);
        osc.frequency.exponentialRampToValueAtTime(980, now + 0.04);
        filter.type = "highpass";
        filter.frequency.value = 500;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.06, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.085);
      } else if(type === "miss"){
        osc.type = "square";
        osc.frequency.setValueAtTime(240, now);
        osc.frequency.exponentialRampToValueAtTime(170, now + 0.10);
        filter.type = "lowpass";
        filter.frequency.value = 900;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
        osc.start(now);
        osc.stop(now + 0.15);
      } else if(type === "clear"){
        osc.type = "sine";
        osc.frequency.setValueAtTime(520, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.14);
        filter.type = "bandpass";
        filter.frequency.value = 1200;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
        osc.start(now);
        osc.stop(now + 0.2);
      }
    }

    function clearHighlights(){
      document.querySelectorAll(".key.active").forEach(el => {
        el.classList.remove("active","LP","LR","LM","LI","RI","RM","RR","RP");
      });
      document.querySelectorAll(".finger.active").forEach(el => {
        el.classList.remove("active");
      });
    }

    function highlightKeyAndFinger(letter){
      clearHighlights();
      if(!letter) return;

      const upper = letter.toUpperCase();
      const key = document.getElementById(`key-${upper}`);
      const fingerId = fingerMap[upper];

      if(key){
        key.classList.add("active");
        if(fingerId) key.classList.add(fingerId);
      }

      if(fingerId){
        const finger = document.getElementById(`finger-${fingerId}`);
        if(finger) finger.classList.add("active");
      }
    }

    function renderTypedLine(){
      const word = getCurrentWord().en;
      typedLine.innerHTML = "";

      for(let i = 0; i < word.length; i++){
        const span = document.createElement("span");
        span.className = "char";
        span.textContent = word[i].toUpperCase();

        if(i < inputIndex){
          span.classList.add("done");
        } else if(i === inputIndex){
          span.classList.add("current");
        }
        typedLine.appendChild(span);
      }

      const next = getNextChar();
      nextKeyBox.textContent = next ? next.toUpperCase() : "✓";
      progressInner.style.width = `${(inputIndex / word.length) * 100}%`;
    }

    function updateStatus(){
      groupInfo.textContent = `グループ ${currentGroupIndex + 1} / 10`;
      wordInfo.textContent = `もんだい ${currentWordIndex + 1} / 10`;
      modeInfo.textContent =
        modeSelect.value === "repeat"
          ? "このグループをくりかえす"
          : "つぎのグループへじどういどう";

      footerNote.textContent =
        modeSelect.value === "repeat"
          ? "グループのおわりまで いったら このグループを もういちど れんしゅうします。"
          : "グループのおわりまで いったら つぎのグループへ じどうで すすみます。";
    }

    function renderWord(){
      const item = getCurrentWord();
      wordDisplay.textContent = item.en;
      translationDisplay.textContent = item.ja;
      inputIndex = 0;
      renderTypedLine();
      updateStatus();
      highlightKeyAndFinger(getNextChar());
      messageEl.textContent = "キーを おして スタート";
      progressInner.style.width = "0%";
      setTimeout(() => speakCurrentWord(), 180);
    }

    function nextWord(){
      currentWordIndex++;

      if(currentWordIndex >= 10){
        currentWordIndex = 0;

        if(modeSelect.value === "auto"){
          currentGroupIndex++;
          if(currentGroupIndex >= 10){
            currentGroupIndex = 0;
          }
          groupSelect.value = currentGroupIndex;
        }
      }

      renderWord();
    }

    function showShake(){
      mainCard.classList.remove("shake");
      void mainCard.offsetWidth;
      mainCard.classList.add("shake");
    }

    function handleCorrectKey(){
      playTone("type");
      inputIndex++;
      renderTypedLine();
      highlightKeyAndFinger(getNextChar());

      const word = getCurrentWord().en;

      if(inputIndex >= word.length){
        playTone("clear");
        progressInner.style.width = "100%";
        messageEl.textContent = "せいかい！";
        clearHighlights();
        setTimeout(() => {
          nextWord();
        }, 650);
      } else {
        messageEl.textContent = "いいね！";
      }
    }

    function handleWrongKey(){
      playTone("miss");
      messageEl.textContent = "ちがうキーです";
      showShake();
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key;

      if(key === " "){
        e.preventDefault();
        speakCurrentWord();
        messageEl.textContent = "もういちど よみあげました";
        return;
      }

      if(key === "Enter"){
        e.preventDefault();
        nextWord();
        return;
      }

      if(!/^[a-zA-Z]$/.test(key)) return;

      const expected = getNextChar();
      if(!expected) return;

      if(key.toLowerCase() === expected.toLowerCase()){
        handleCorrectKey();
      } else {
        handleWrongKey();
      }
    });

    groupSelect.addEventListener("change", () => {
      currentGroupIndex = Number(groupSelect.value);
      currentWordIndex = 0;
      renderWord();
    });

    modeSelect.addEventListener("change", () => {
      updateStatus();
    });

    replayBtn.addEventListener("click", () => {
      speakCurrentWord();
      messageEl.textContent = "もういちど よみあげました";
    });

    shuffleBtn.addEventListener("click", () => {
      shuffleCurrentGroup();
      currentWordIndex = 0;
      renderWord();
      messageEl.textContent = "このグループを シャッフルしました";
    });

    restartBtn.addEventListener("click", () => {
      currentGroupIndex = 0;
      currentWordIndex = 0;
      groupSelect.value = "0";
      renderWord();
      messageEl.textContent = "はじめから スタート";
    });

    window.addEventListener("click", () => {
      if(audioCtx && audioCtx.state === "suspended"){
        audioCtx.resume();
      }
    });

    buildGroupSelect();
    buildKeyboard();
    updateStatus();
    renderWord();
  </script>
</body>
